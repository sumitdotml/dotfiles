set -g prefix ^A
set -g base-index 1              # start indexing windows at 1 instead of 0
set-option -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"   # forward 24-bit color to apps
set -g mouse on

# Behavior
set -sg escape-time 0            # no delay on ESC
set -g focus-events on           # propagate focus events (Vim autoread, etc.)
set -g renumber-windows on       # close window 2 -> windows 3,4 shift to 2,3
set -g history-limit 50000       # generous scrollback for nvcc/nsys output

# vim mode: gotta activate it with prefix (^A) + [ in my case
set-window-option -g mode-keys vi

# yank in vim mode: copies to clipboard
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# prefix + r reloads this config (used constantly while tweaking)
bind r source-file ~/.tmux.conf \; display "reloaded ~/.tmux.conf"

# status bar
set -g status-bg "#2a2a2a"
set -g status-fg "#aaaaaa"
set -g status-interval 5

# left: hostname + SSH badge when connected over ssh
# #{E:SSH_CONNECTION} reads the env var from the tmux server's environment
set -g status-left-length 60
set -g status-left "#{?#{!=:#{E:SSH_CONNECTION},},#[bg=#7aa2f7#,fg=#2a2a2a#,bold] SSH ,}#[bg=#3a3a3a,fg=#cccccc,bold] #h #[bg=#2a2a2a,fg=#aaaaaa] "

# window list: padding both states so the active block has breathing room
set -g window-status-format " #I:#W#F "
set -g window-status-current-format " #I:#W#F "
set -g window-status-current-style "bg=#9a8cb5,fg=#2a2a2a,bold"
set -g window-status-style "fg=#888888"

# right: mode indicator (prefix / copy) + window | session
# #{?client_prefix,...,...} fires when ^A has been pressed and tmux is waiting
# #{?pane_in_mode,...,...}  fires when in copy-mode (vi-style scroll/yank)
# GPU stats come from ~/.tmux/scripts/gpu-status.sh (calls nvidia-smi).
# CPU/RAM interpolations come from tmux-plugins/tmux-cpu (loaded via tpm below).
set -g status-right-length 180
set -g status-right "#{?client_prefix,#[bg=#e0af68#,fg=#2a2a2a#,bold] PREFIX ,}#{?pane_in_mode,#[bg=#9ece6a#,fg=#2a2a2a#,bold] COPY ,}#[bg=#2a2a2a,fg=#aaaaaa] #{?#{!=:#{E:SSH_CONNECTION},},#(~/.tmux/scripts/ssh-info.sh) #[fg=#555555]│#[fg=#aaaaaa] ,}#(~/.tmux/scripts/gpu-status.sh) #[fg=#555555]│#[fg=#aaaaaa] CPU #{cpu_percentage} RAM #{ram_percentage} #[fg=#555555]│#[fg=#aaaaaa] #W #[fg=#555555]│#[fg=#aaaaaa] #S "

# pane borders: dim inactive, accented active
set -g pane-border-style "fg=#3a3a3a"
set -g pane-active-border-style "fg=#9a8cb5"

# message popups (prefix + :, errors, etc.)
set -g message-style "bg=#3a3a3a,fg=#cccccc,bold"

# plugins (managed by tpm — install/update with prefix + I / prefix + U)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'

# initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

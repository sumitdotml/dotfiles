set -g prefix ^A
set -g base-index 1              # start indexing windows at 1 instead of 0
set-option -g default-terminal "screen-256color"
set -g mouse on
set -g focus-events on           # propagate focus events (Vim autoread, etc.)
set -g status-interval 5
set -g renumber-windows on       # close window 2 -> windows 3,4 shift to 2,3

# vim mode: gotta activate it with prefix (^A) + [ in my case
set-window-option -g mode-keys vi

# yank in vim mode: copies to clipboard
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -ogq u/catppuccin_window_text " #W"

# prefix + r reloads this config (used constantly while tweaking)
bind r source-file ~/.tmux.conf \; display "reloaded ~/.tmux.conf"

set -ogq u/catppuccin_window_current_text " #W"

# Preserve the Catppuccin theme
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "basic"

# Load the Catppuccin theme
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Adjust status-right and status-left
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application} #{E:@catppuccin_status_session}"

# Initialize TMUX plugin manager (keep this line ar the very bottom of tmux.conf)
# run '~/.tmux/plugins/tpm/tpm'
